name: secure-web

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Python tests
        run: python3 -m unittest discover -s tests

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.22.3"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Web tests
        working-directory: web
        run: npm run test:run

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Production build
        working-directory: web
        run: npm run build

      - name: Cross-process secure upload acceptance
        run: |
          set -euo pipefail
          cleanup() {
            kill "${WEB_PID:-}" "${WORKER_PID:-}" 2>/dev/null || true
          }
          trap cleanup EXIT
          (cd web && npm start > /tmp/crossbeam-web.log 2>&1) &
          WEB_PID=$!
          for attempt in $(seq 1 40); do
            curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null && break
            sleep 0.25
          done
          curl --fail --silent --cookie-jar /tmp/crossbeam.cookies \
            --header 'content-type: application/json' \
            --header 'origin: http://127.0.0.1:3000' \
            --data '{}' http://127.0.0.1:3000/api/auth/sign-in/anonymous >/dev/null
          curl --fail --silent --cookie /tmp/crossbeam.cookies \
            http://127.0.0.1:3000/cases >/dev/null
          python3 -m worker.secure_worker.server > /tmp/crossbeam-worker.log 2>&1 &
          WORKER_PID=$!
          for attempt in $(seq 1 40); do
            curl --fail --silent http://127.0.0.1:8787/health >/dev/null && break
            sleep 0.25
          done
          cd web
          npm run acceptance:upload
